<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOS MONOS MUSIC - RUIDO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-youtube {
            background-color: #FF0000;
            transition: all 0.3s ease;
        }
        .btn-youtube:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }
        .profile-img {
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            background-color: #000000; /* Fondo negro para que la foto luzca mejor */
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full glass-card rounded-3xl p-8 text-center">
        <!-- Banner/Logo con imagen ajustada -->
        <div class="mb-6 relative">
            <!-- Contenedor del círculo -->
            <div class="w-32 h-32 mx-auto rounded-full overflow-hidden border-4 border-red-600 profile-img mb-6 flex items-center justify-center">
                <!-- Imagen de perfil: usando object-contain para mostrar más parte de la foto -->
                <img src="https://losmonos.ct.ws/imagen_recortada.jpg"
                     alt="LOS MONOS MUSIC"
                     onerror="this.src='https://via.placeholder.com/150?text=MONOS'"
                     class="w-full h-full object-contain scale-110"> <!-- Scale 110 para ajustar el aire en los bordes si es necesario -->
            </div>
            <h1 class="text-2xl font-bold tracking-tighter uppercase">Los Monos Music</h1>
            <p class="text-gray-400 text-sm">@LOSMONOS-MUSIC</p>
        </div>

        <!-- Contenido del Lanzamiento -->
        <div class="mb-8">
            <span class="bg-red-600 text-[10px] font-black px-2 py-1 rounded mb-2 inline-block animate-pulse">NUEVO SINGLE</span>
            <h2 class="text-4xl font-black italic mb-2 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-500">
                "RUIDO"
            </h2>
            <p class="text-gray-300 text-sm px-4">
                Ya disponible en nuestro canal oficial. ¡Dale play y suscríbete!
            </p>
        </div>

        <!-- Botón de Acción -->
        <a href="https://www.youtube.com/@LOSMONOS-MUSIC?sub_confirmation=1"
           target="_blank"
           class="btn-youtube flex items-center justify-center gap-3 w-full py-4 rounded-xl font-bold text-lg mb-4">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
            </svg>
            ESCUCHAR AHORA
        </a>

        <!-- Redes/Footer -->
        <div class="flex justify-center gap-4 text-gray-500 text-xs">
            <span>COMPARTIR</span>
            <span>•</span>
            <span>SUSCRIBIRSE</span>
        </div>
    </div>

</body>
</html>
